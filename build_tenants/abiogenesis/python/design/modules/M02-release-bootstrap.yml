id: MOD-002
name: release_bootstrap
description: Owns install, audit, wrapper generation, project scaffold publication, territory separation, bootloader compilation, the install-managed release declaration, and publication of the shipped runtime carrier for methodology delivery, including worker defaults.
implements_features:
  - release.install
  - release.wrapper_generation
  - release.bootloader_compile
  - release.territory_boundary
  - release.command_carrier
  - release.project_templates
  - release.runtime_carrier
  - release.worker_registry
dependencies:
  - workflow_core
rank: 2
interfaces:
  - install(target, source, audit_only=False)
  - load_project_requirements()
  - render_wrapper()
  - synthesize_bootloader()
source_files:
  - src/genesis_sdlc/release/install.py
  - src/genesis_sdlc/release/bootloader.py
  - src/genesis_sdlc/release/wrapper.py
  - src/genesis_sdlc/release/territory.py
  - release/active-workflow.json
  - release/commands/gen-iterate.md
  - release/commands/gen-review.md
  - release/runtime/backends.json
  - release/runtime/adapter-contract.json
  - release/runtime/workers.json
  - release/runtime/role-assignments.json
publishes_surfaces:
  - .gsdlc/release/runtime/
consumes_surfaces:
  - repo://specification/standards/templates/INTENT_TEMPLATE.md
  - repo://specification/standards/templates/requirements/README_TEMPLATE.md
  - repo://specification/standards/templates/requirements/STARTER_REQUIREMENTS_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/TENANT_REGISTRY_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/common/README_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/common/design/README_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/variant/README_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/variant/design/README_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/variant/design/fp/README_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/variant/design/fp/INTENT_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/variant/design/fp/edge-overrides/README_TEMPLATE.md
  - repo://specification/standards/templates/build_tenants/variant/design/fp/edge-overrides/EDGE_OVERRIDE_TEMPLATE.json
  - repo://specification/standards/templates/docs/README_TEMPLATE.md
